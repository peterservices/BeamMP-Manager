name: Ruff

on:
  push:
    paths:
      - '**'
      - '!**.md'
      - '!assets/**'
      - '!**.yml'
      - '.github/workflows/ruff.yml'
  pull_request:

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v4.0.0
