name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths:
      - '!**.md'
      - '!**.yml'
      - '.github/workflows/build.yml'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            asset_name: beammp_manager_windows_x64
          - os: ubuntu-24.04
            asset_name: beammp_manager_ubuntu_24_x64
          - os: ubuntu-22.04
            asset_name: beammp_manager_ubuntu_22_x64
          - os: ubuntu-24.04-arm
            asset_name: beammp_manager_ubuntu_24_arm64
          - os: ubuntu-22.04-arm
            asset_name: beammp_manager_ubuntu_22_arm64
          
    runs-on: ${{ matrix.os }}

    env:
      MAIN_PY_FILE: 'src/main.py'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.13.x

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Build executable directory
        run: uv run pyinstaller --name beammp_manager --add-data "static:static" --add-data "templates:templates" ${{ env.MAIN_PY_FILE }}

      - name: Add example .env file
        run: cp .env.example dist/beammp_manager

      - name: Zip directory
        working-directory: dist/beammp_manager
        run: |
          7z a ${{ matrix.asset_name }}.zip *
          7z a ${{ matrix.asset_name }}.zip .env.example

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}.zip
          path: dist/beammp_manager/${{ matrix.asset_name }}.zip
          retention-days: 15
          overwrite: true
          archive: false

  release:
    runs-on: windows-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: beammp_manager_*
          skip-decompress: true
          merge-multiple: true

      - name: Upload to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file_glob: true
          file: beammp_manager_*
          tag: ${{ github.ref }}
          draft: true
          overwrite: true
