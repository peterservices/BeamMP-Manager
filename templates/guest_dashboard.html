<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="{{base}}/static/css/guest_dashboard.css"/>
        <title>Guest | BeamMP Manager</title>
        <link rel="icon" type="image/png" href="{{base}}/static/images/icon.png"/>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    </head>

    <body>
        <!-- Navbar -->
        <nav class="navbar bg-white" style="border-bottom-color: #f3f3f3; border-bottom-width: 4px; border-bottom-style: solid;">
            <div class="container-fluid d-flex align-items-center" style="min-height: 60px;">
                <span class="navbar-brand d-flex align-items-center">
                    <img src="{{base}}/static/images/icon_nav.png" alt="Logo" width="40" height="40" style="margin-right: 5%; margin-left: 0%;">
                    BeamMP Manager | Guest
                </span>
                <!-- Login Button -->
                <div class="container position-absolute top-50 end-0 translate-middle-y styled-single-button-container" style="min-height: 40px; margin-right: 1%; margin-left: 0%;">
                    <a href="{{base}}/login">
                        <button type="button" class="btn position-absolute start-50 top-50 translate-middle styled-single-button">
                            Login
                        </button>
                        <div class="container position-absolute top-50 start-0 translate-middle-y styled-single-button-accent-left"></div>
                        <div class="container position-absolute top-50 end-0 translate-middle-y styled-single-button-accent-right"></div>
                    </a>
                </div>

            </div>
        </nav>

        <!-- Content -->
        <div id="modsPage" style="margin-top: 5%;">
            <div style="background-color: #f3f3f3; height: 70vh; padding-right: 5%; margin-left: 25%; width: 40%; padding-left: 5%; border-radius: 50px;">
                <h2 id="modsLabel" class="text-center" data-bs-toggle="tooltip" data-bs-title=" " style="width: 80%; margin-right: 10%; margin-left: 10%; border-bottom-width: 4px; border-bottom-color: #FF6700; border-bottom-style: solid; padding-bottom: 1%;">Mods</h2>
                <div id="mods" style="height: 60vh; overflow-y: auto; padding-right: 1%;">

                </div>
                <p class="text-center" style="color: #999999;">Refresh page to refresh the mods list</p>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
        <script src="{{base}}/static/js/guest_dashboard.js"></script>
    </body>

</html>
