<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="{{base}}/static/css/login.css"/>
        <title>Login | BeamMP Manager</title>
        <title>Website Name</title>
        <!-- Meta Tags -->
        <meta content="BeamMP Manager" property="og:title" />
        <meta property="og:type" content="website" />
        <meta content="https://probot.servehttp.com/beammp" property="og:url" />
        <meta content="{{base}}/static/images/icon_nav.png" property="og:image" />
        <meta content="Manage your BeamMP server. Download and upload mods, view logs, and more!" property="og:description" />
        <meta content="#FF6700" name="theme-color" />
        <!--  -->
        <link rel="icon" type="image/png" href="{{base}}/static/images/icon.png"/>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    </head>

    <body>
        <div class="container-fluid login-bg-gradient" style="height: 100vh;">
            <div class="container bg-dark rounded-4 position-absolute top-50 start-50 translate-middle" style="height: 30%; width: 30%; outline-color: #FF6700; outline-width: 7px; outline-style: inset;">
                <div class="container position-absolute bottom-50 start-50 translate-middle login-button-container">
                    <a href="{{base}}/login/uri">
                        <button type="button" class="btn position-absolute start-50 top-50 translate-middle login-button">
                            <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" class="bi bi-discord" viewBox="0 0 16 16" style="overflow: visible;">
                                <path d="M13.545 2.907a13.2 13.2 0 0 0-3.257-1.011.05.05 0 0 0-.052.025c-.141.25-.297.577-.406.833a12.2 12.2 0 0 0-3.658 0 8 8 0 0 0-.412-.833.05.05 0 0 0-.052-.025c-1.125.194-2.22.534-3.257 1.011a.04.04 0 0 0-.021.018C.356 6.024-.213 9.047.066 12.032q.003.022.021.037a13.3 13.3 0 0 0 3.995 2.02.05.05 0 0 0 .056-.019q.463-.63.818-1.329a.05.05 0 0 0-.01-.059l-.018-.011a9 9 0 0 1-1.248-.595.05.05 0 0 1-.02-.066l.015-.019q.127-.095.248-.195a.05.05 0 0 1 .051-.007c2.619 1.196 5.454 1.196 8.041 0a.05.05 0 0 1 .053.007q.121.1.248.195a.05.05 0 0 1-.004.085 8 8 0 0 1-1.249.594.05.05 0 0 0-.03.03.05.05 0 0 0 .003.041c.24.465.515.909.817 1.329a.05.05 0 0 0 .056.019 13.2 13.2 0 0 0 4.001-2.02.05.05 0 0 0 .021-.037c.334-3.451-.559-6.449-2.366-9.106a.03.03 0 0 0-.02-.019m-8.198 7.307c-.789 0-1.438-.724-1.438-1.612s.637-1.613 1.438-1.613c.807 0 1.45.73 1.438 1.613 0 .888-.637 1.612-1.438 1.612m5.316 0c-.788 0-1.438-.724-1.438-1.612s.637-1.613 1.438-1.613c.807 0 1.451.73 1.438 1.613 0 .888-.631 1.612-1.438 1.612"/>
                            </svg>
                            Login with Discord
                        </button>
                        <div class="container position-absolute top-50 start-0 translate-middle-y login-button-container-left"></div>
                        <div class="container position-absolute top-50 start-50 translate-middle-y login-button-container-right"></div>
                    </a>
                </div>
                <div class="container position-absolute bottom-0 start-50 translate-middle login-button-container" aria-disabled="{{disabled_aria}}" {{disabled_inert}}>
                    <div class="{{disabled_class}}"></div>
                    <a href="{{base}}/guest_dashboard">
                        <button type="button" class="btn position-absolute start-50 top-50 translate-middle login-button">
                            <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" class="bi bi-person" viewBox="0 0 16 16">
                                <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z"/>
                            </svg>
                            Login as Guest
                        </button>
                        <div class="container position-absolute top-50 start-0 translate-middle-y login-button-container-left"></div>
                        <div class="container position-absolute top-50 start-50 translate-middle-y login-button-container-right"></div>
                    </a>
                </div>
            </div>
            <div class="toast-container position-fixed p-3 bottom-0 end-0">
                <div id="unauthorizedToast" class="toast align-items-center text-bg-danger" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="10000">
                    <div class="d-flex">
                        <div class="toast-body">
                            You do not have access to this dashboard. Login as a guest to see and download mods.
                        </div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                    </div>
                </div>
            </div>
            <div class="toast-container position-fixed p-3 bottom-0 end-0">
                <div id="errorToast" class="toast align-items-center text-bg-danger" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="10000">
                    <div class="d-flex">
                        <div class="toast-body">
                            Something went wrong, please try again later.
                        </div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                    </div>
                </div>
            </div>
        </div>
        <span id="error-data" hidden="true">{{error}}</span>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
        <script src="{{base}}/static/js/login.js"></script>
    </body>

</html>
